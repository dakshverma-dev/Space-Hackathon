services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: project-aether:latest
    container_name: project-aether
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
